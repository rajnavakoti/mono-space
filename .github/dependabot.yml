version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Europe/London
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: chore
      include: scope
    groups:
      next:
        patterns:
          - "next"
          - "@next/*"
          - "eslint-config-next"
      types:
        patterns:
          - "@types/*"
      testing:
        patterns:
          - "jest"
          - "jest-*"
          - "ts-jest"
          - "@testing-library/*"
      mdx:
        patterns:
          - "next-mdx-remote"
          - "@mdx-js/*"
          - "gray-matter"
          - "remark*"
          - "rehype*"
      lint:
        patterns:
          - "eslint"
          - "eslint-*"
          - "@typescript-eslint/*"
          - "prettier"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Europe/London
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: chore
      include: scope
